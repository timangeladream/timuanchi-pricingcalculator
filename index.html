<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飾品定價試算器</title>
<style>
  :root{
    --bg:#FAF8F4;
    --card:#FFFFFF;
    --border:#E4DFD5;
    --border-strong:#CFC8B8;
    --text:#2B2620;
    --text-secondary:#75695A;
    --text-muted:#A69C89;
    --accent:#B5794A;
    --accent-bg:#F3E7D8;
    --accent-text:#8A5A2D;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:2rem 1rem 4rem;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
    line-height:1.6;
  }
  .wrap{max-width:820px; margin:0 auto;}
  h1{
    font-size:22px;
    font-weight:600;
    margin:0 0 4px;
  }
  .subtitle{
    font-size:14px;
    color:var(--text-secondary);
    margin:0 0 2rem;
  }
  .section-title{
    font-size:14px;
    font-weight:600;
    color:var(--text-secondary);
    margin:0 0 10px;
  }
  .hint{
    font-size:12px;
    color:var(--text-muted);
    margin:-4px 0 10px;
  }
  .grid{
    display:grid;
    gap:12px 16px;
    margin-bottom:1.5rem;
  }
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  label{
    display:block;
    font-size:12px;
    color:var(--text-secondary);
    margin-bottom:4px;
  }
  input[type=number], input[type=text]{
    width:100%;
    height:38px;
    padding:0 10px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    font-size:14px;
    background:#fff;
    color:var(--text);
  }
  input:focus{
    outline:none;
    border-color:var(--accent);
  }
  input:disabled{
    background:#EDE9DF;
    color:var(--text-muted);
    border-color:var(--border);
    cursor:not-allowed;
  }
  .readout{
    height:38px;
    display:flex;
    align-items:center;
    padding:0 10px;
    background:var(--accent-bg);
    color:var(--accent-text);
    border-radius:var(--radius);
    font-weight:600;
    font-size:14px;
  }
  .readout.plain{background:#F1EDE4; color:var(--text);}
  button{
    font-family:inherit;
    font-size:13px;
    padding:6px 12px;
    border:1px solid var(--border-strong);
    background:#fff;
    border-radius:var(--radius);
    cursor:pointer;
    color:var(--text);
  }
  button:hover{background:#F5F1E9;}
  button:active{transform:scale(0.98);}
  .list-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid var(--border);
  }
  .row.disabled{opacity:0.4;}
  .row input[type=text]{width:110px; height:34px;}
  .row input[type=number]{width:80px; height:34px;}
  .row-fee input[type=text]{width:100px;}
  .row-del{
    margin-left:auto;
    padding:5px 9px;
    color:#A34747;
    border-color:#E5C9C9;
  }
  .row-del:hover{background:#FBEEEE;}
  .switch{
    position:relative;
    display:inline-block;
    width:34px;
    height:20px;
    flex-shrink:0;
    cursor:pointer;
  }
  .switch input{opacity:0; width:0; height:0;}
  .switch .track{
    position:absolute; inset:0;
    background:var(--border-strong);
    border-radius:20px;
    transition:0.15s;
  }
  .switch input:checked + .track{background:var(--accent);}
  .switch .thumb{
    position:absolute; top:3px; left:3px;
    width:14px; height:14px;
    background:#fff;
    border-radius:50%;
    transition:0.15s;
  }
  .switch input:checked ~ .thumb{left:17px;}
  .standalone-label{
    display:flex; align-items:center; gap:4px;
    font-size:12px; color:var(--text-secondary);
    margin-left:6px;
    white-space:nowrap;
  }
  .add-btn{
    display:inline-flex; align-items:center; gap:4px;
  }
  .cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:1rem 1.1rem;
  }
  .card-label{
    font-size:13px;
    color:var(--text-secondary);
    margin:0 0 10px;
  }
  .card-small{
    font-size:11px;
    color:var(--text-muted);
    margin:0;
  }
  .card-val{
    font-size:17px;
    font-weight:600;
    margin:0 0 10px;
  }
  .card-val-hero{
    font-size:24px;
    font-weight:700;
    margin:0 0 10px;
    color:var(--accent-text);
  }
  footer{
    text-align:center;
    font-size:12px;
    color:var(--text-muted);
    margin-top:2.5rem;
  }
  @media (max-width:640px){
    .grid-4{grid-template-columns:repeat(2,1fr);}
    .cards{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>飾品定價試算器</h1>
  <p class="subtitle">輸入進貨成本與各項雜支,自動算出建議售價與淨利</p>

  <div class="row" style="margin-bottom:14px; padding:10px 12px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius);">
    <label class="switch">
      <input type="checkbox" id="currencyModeToggle">
      <span class="track"></span><span class="thumb"></span>
    </label>
    <span id="currencyModeLabel" style="font-size:13px; color:var(--text-secondary);">目前輸入幣別:人民幣(自動換算台幣)</span>
  </div>

  <div class="grid grid-4">
    <div>
      <label for="rmb" id="rmbLabel">人民幣進價</label>
      <input type="number" id="rmb" value="8.77" step="0.01">
    </div>
    <div>
      <label for="rate" id="rateLabel">匯率</label>
      <input type="number" id="rate" value="5" step="0.1">
    </div>
    <div>
      <label id="twdLabel">台幣(自動換算)</label>
      <input type="number" id="twd" value="43.85" step="0.01" disabled>
    </div>
    <div>
      <label for="q">倍數</label>
      <input type="number" id="q" value="5.12" step="0.01">
    </div>
  </div>

  <div class="grid grid-2">
    <div>
      <label for="r">包裝成本</label>
      <input type="number" id="r" value="10" step="1">
    </div>
    <div>
      <label>毛利率(自動算出)</label>
      <div class="readout" id="out-u">-</div>
    </div>
  </div>

  <div class="list-header">
    <p class="section-title" style="margin:0;">成本項目</p>
    <button id="addCostBtn" class="add-btn">+ 新增項目</button>
  </div>
  <div id="costList" style="margin-bottom:1.5rem;"></div>

  <div class="list-header">
    <p class="section-title" style="margin:0;">手續費 / 抽成比例項目</p>
    <button id="addFeeBtn" class="add-btn">+ 新增項目</button>
  </div>
  <p class="hint">勾選「獨立售價」的項目(如寄櫃)不會併入稅後售價的手續費加總,而是另外算出一個獨立售價</p>
  <div id="feeList" style="margin-bottom:1.5rem;"></div>

  <p class="section-title">設計成本(三種比較情境)</p>
  <div class="grid grid-3">
    <input type="number" id="aa1" value="100" step="1">
    <input type="number" id="aa2" value="50" step="1">
    <input type="number" id="aa3" value="0" step="1">
  </div>

  <div class="cards" id="cards"></div>

  <footer>此頁面為純前端計算,所有資料僅存在瀏覽器當下畫面,重新整理後會恢復預設值</footer>
</div>

<script>
let costItems = [
  {id:1, name:'官網成本', value:50, enabled:true},
  {id:2, name:'物流成本', value:60, enabled:true},
  {id:3, name:'改夾成本', value:15, enabled:true},
  {id:4, name:'折扣成本', value:30, enabled:true},
  {id:5, name:'擺攤成本', value:100, enabled:true},
];
let feeItems = [
  {id:1, name:'官網手續費', percent:2, enabled:true, standalone:false},
  {id:2, name:'官網回饋金', percent:2, enabled:true, standalone:false},
  {id:3, name:'金流費', percent:3, enabled:true, standalone:false},
  {id:4, name:'物流費', percent:3, enabled:true, standalone:false},
  {id:5, name:'營業稅', percent:5, enabled:true, standalone:false},
  {id:6, name:'寄櫃', percent:50, enabled:true, standalone:true},
];
let nextCostId = 6, nextFeeId = 7;

function switchHtml(dataAttr, id, checked){
  return '<label class="switch">'+
    '<input type="checkbox" '+dataAttr+'="'+id+'" '+(checked?'checked':'')+'>'+
    '<span class="track"></span><span class="thumb"></span>'+
    '</label>';
}

function renderCostList(){
  document.getElementById('costList').innerHTML = costItems.map(it => (
    '<div class="row'+(it.enabled?'':' disabled')+'">'+
    switchHtml('data-cost-toggle', it.id, it.enabled)+
    '<input type="text" data-cost-name="'+it.id+'" value="'+it.name+'">'+
    '<input type="number" data-cost-value="'+it.id+'" value="'+it.value+'">'+
    '<span style="font-size:13px;color:var(--text-muted);">元(台幣)</span>'+
    '<button class="row-del" data-cost-del="'+it.id+'">刪除</button>'+
    '</div>'
  )).join('');
}

function renderFeeList(){
  document.getElementById('feeList').innerHTML = feeItems.map(it => (
    '<div class="row row-fee'+(it.enabled?'':' disabled')+'">'+
    switchHtml('data-fee-toggle', it.id, it.enabled)+
    '<input type="text" data-fee-name="'+it.id+'" value="'+it.name+'">'+
    '<input type="number" data-fee-value="'+it.id+'" value="'+it.percent+'">'+
    '<span style="font-size:13px;color:var(--text-muted);">%</span>'+
    '<label class="standalone-label"><input type="checkbox" data-fee-standalone="'+it.id+'" '+(it.standalone?'checked':'')+'> 獨立售價</label>'+
    '<button class="row-del" data-fee-del="'+it.id+'">刪除</button>'+
    '</div>'
  )).join('');
}

function calcOne(L,Q,R,AA){
  const M = L;
  const S = M+R;
  const T = S*Q;
  const U = T>0 ? (T-S)/T : 0;
  const costSum = costItems.filter(c=>c.enabled).reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const AB = T + costSum + AA;
  const feeRate = feeItems.filter(f=>f.enabled && !f.standalone).reduce((s,f)=>s+(parseFloat(f.percent)||0),0)/100;
  const AI = AB*feeRate;
  const AJ = feeRate < 1 ? AB/(1-feeRate) : AB;
  const AK = Math.ceil(AJ/10)*10;
  const AP = AJ - AI - AA - costSum - S;
  const standalones = feeItems.filter(f=>f.enabled && f.standalone).map(f=>{
    const r2 = (parseFloat(f.percent)||0)/100;
    return {name:f.name, price: r2<1 ? AB/(1-r2) : AB};
  });
  return {L,S,T,U,AJ,AK,AP,standalones};
}

function fmt(n){ return 'NT$'+Number(n).toLocaleString('zh-TW',{maximumFractionDigits:1}); }

function renderCards(){
  const twdMode = document.getElementById('currencyModeToggle').checked;
  const twdInput = document.getElementById('twd');
  let L;
  if(twdMode){
    L = parseFloat(twdInput.value)||0;
    const rate = parseFloat(document.getElementById('rate').value)||0;
    const rmbInput = document.getElementById('rmb');
    rmbInput.value = rate ? (L/rate).toFixed(2) : '0.00';
  } else {
    const K = parseFloat(document.getElementById('rmb').value)||0;
    const rate = parseFloat(document.getElementById('rate').value)||0;
    L = K*rate;
    twdInput.value = L.toFixed(2);
  }
  const Q = parseFloat(document.getElementById('q').value)||0;
  const R = parseFloat(document.getElementById('r').value)||0;
  const AA1 = parseFloat(document.getElementById('aa1').value)||0;
  const AA2 = parseFloat(document.getElementById('aa2').value)||0;
  const AA3 = parseFloat(document.getElementById('aa3').value)||0;

  const results = [
    {label:'設計成本 '+AA1, r: calcOne(L,Q,R,AA1)},
    {label:'設計成本 '+AA2, r: calcOne(L,Q,R,AA2)},
    {label:'設計成本 '+AA3, r: calcOne(L,Q,R,AA3)},
  ];

  document.getElementById('out-u').textContent = (results[0].r.U*100).toFixed(1)+'%';

  document.getElementById('cards').innerHTML = results.map(({label,r})=>{
    let html = '<div class="card">'+
      '<p class="card-label">'+label+'</p>'+
      '<p class="card-small">稅後售價</p>'+
      '<p class="card-val">'+fmt(r.AJ.toFixed(1))+'</p>'+
      '<p class="card-small">一般售價</p>'+
      '<p class="card-val-hero">'+fmt(r.AK.toFixed(0))+'</p>';
    r.standalones.forEach(s=>{
      html += '<p class="card-small">'+s.name+'售價</p><p class="card-val">'+fmt(s.price.toFixed(1))+'</p>';
    });
    html += '<p class="card-small">扣除各成本淨利</p><p class="card-val">'+fmt(r.AP.toFixed(1))+'</p></div>';
    return html;
  }).join('');
}

function recalcAll(){ renderCards(); }

document.getElementById('addCostBtn').addEventListener('click', ()=>{
  costItems.push({id: nextCostId++, name:'新項目', value:0, enabled:true});
  renderCostList(); recalcAll();
});
document.getElementById('addFeeBtn').addEventListener('click', ()=>{
  feeItems.push({id: nextFeeId++, name:'新項目', percent:0, enabled:true, standalone:false});
  renderFeeList(); recalcAll();
});

document.getElementById('costList').addEventListener('input', (e)=>{
  const t = e.target;
  if(t.dataset.costName){ costItems.find(c=>c.id==t.dataset.costName).name = t.value; }
  if(t.dataset.costValue){ costItems.find(c=>c.id==t.dataset.costValue).value = t.value; recalcAll(); }
});
document.getElementById('costList').addEventListener('click', (e)=>{
  const delBtn = e.target.closest('[data-cost-del]');
  if(delBtn){ costItems = costItems.filter(c=>c.id!=delBtn.dataset.costDel); renderCostList(); recalcAll(); return; }
});
document.getElementById('costList').addEventListener('change', (e)=>{
  const t = e.target;
  if(t.dataset.costToggle){
    const item = costItems.find(c=>c.id==t.dataset.costToggle);
    item.enabled = t.checked;
    renderCostList(); recalcAll();
  }
});

document.getElementById('feeList').addEventListener('input', (e)=>{
  const t = e.target;
  if(t.dataset.feeName){ feeItems.find(f=>f.id==t.dataset.feeName).name = t.value; }
  if(t.dataset.feeValue){ feeItems.find(f=>f.id==t.dataset.feeValue).percent = t.value; recalcAll(); }
});
document.getElementById('feeList').addEventListener('click', (e)=>{
  const delBtn = e.target.closest('[data-fee-del]');
  if(delBtn){ feeItems = feeItems.filter(f=>f.id!=delBtn.dataset.feeDel); renderFeeList(); recalcAll(); return; }
});
document.getElementById('feeList').addEventListener('change', (e)=>{
  const t = e.target;
  if(t.dataset.feeToggle){
    const item = feeItems.find(f=>f.id==t.dataset.feeToggle);
    item.enabled = t.checked;
    renderFeeList(); recalcAll();
  }
  if(t.dataset.feeStandalone){
    feeItems.find(f=>f.id==t.dataset.feeStandalone).standalone = t.checked;
    recalcAll();
  }
});

['rmb','rate','q','r','aa1','aa2','aa3','twd'].forEach(id=>{
  document.getElementById(id).addEventListener('input', recalcAll);
});

function applyCurrencyMode(){
  const twdMode = document.getElementById('currencyModeToggle').checked;
  document.getElementById('rmb').disabled = twdMode;
  document.getElementById('twd').disabled = !twdMode;
  document.getElementById('currencyModeLabel').textContent = twdMode
    ? '目前輸入幣別:台幣(直接輸入,人民幣自動換算顯示)'
    : '目前輸入幣別:人民幣(自動換算台幣)';
}

document.getElementById('currencyModeToggle').addEventListener('change', ()=>{
  applyCurrencyMode();
  recalcAll();
});

applyCurrencyMode();
renderCostList();
renderFeeList();
recalcAll();
</script>
</body>
</html>
